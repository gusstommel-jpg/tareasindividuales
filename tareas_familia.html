<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tareas de Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F0F4F8;
    --card: #FFFFFF;
    --text: #1A202C;
    --text-light: #718096;
    --border: #E2E8F0;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1, h2, h3, .display { font-family: 'Nunito', sans-serif; }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* HOME SCREEN */
  #screen-home {
    background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
    padding: 0;
  }

  .home-header {
    padding: 52px 24px 24px;
    color: white;
  }

  .home-header .greeting {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.75;
    margin-bottom: 6px;
  }

  .home-header h1 {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.1;
  }

  .home-header .week-label {
    font-size: 13px;
    opacity: 0.75;
    margin-top: 6px;
    font-weight: 600;
  }

  .cards-container {
    flex: 1;
    padding: 16px 16px 100px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-content: start;
  }

  .child-card {
    background: white;
    border-radius: 22px;
    padding: 20px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .child-card:active { transform: scale(0.97); }

  .child-card .card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    border-radius: 22px 22px 0 0;
  }

  .child-card .child-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: white;
    margin-bottom: 12px;
  }

  .child-card .child-name {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: #1A202C;
    margin-bottom: 10px;
  }

  .child-card .progress-ring-container {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ring-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #F0F4F8; stroke-width: 5; }
  .ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .ring-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 900;
    color: #1A202C;
  }

  .progress-info .pct-label {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
  }

  .progress-info .pct-sub {
    font-size: 11px;
    color: #718096;
    font-weight: 600;
    margin-top: 2px;
  }

  /* ADMIN FAB */
  .admin-fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    font-size: 20px;
    color: white;
    transition: background 0.2s;
  }
  .admin-fab:active { background: rgba(255,255,255,0.4); }

  /* CHILD SCREEN */
  #screen-child {
    background: var(--bg);
  }

  .child-header {
    padding: 52px 20px 20px;
    color: white;
    position: relative;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    margin-bottom: 18px;
    background: none;
    border: none;
    padding: 0;
  }

  .child-header-name {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 4px;
  }

  .child-header-date {
    font-size: 13px;
    opacity: 0.8;
    font-weight: 600;
  }

  .weekly-progress-bar {
    margin-top: 16px;
    background: rgba(255,255,255,0.2);
    border-radius: 50px;
    height: 10px;
    overflow: hidden;
  }

  .weekly-progress-fill {
    height: 100%;
    border-radius: 50px;
    background: white;
    transition: width 0.5s ease;
  }

  .weekly-pct-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }

  .weekly-pct-label span {
    font-size: 12px;
    opacity: 0.85;
    font-weight: 700;
  }

  /* DAY TABS */
  .day-tabs-wrap {
    background: white;
    padding: 12px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 2px;
  }

  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    background: #F0F4F8;
    color: #718096;
    border: none;
    text-align: center;
    min-width: 52px;
  }

  .day-tab .tab-day { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .day-tab .tab-num { display: block; font-size: 15px; margin-top: 1px; }

  .day-tab.active {
    color: white;
  }

  .day-tab.today-tab:not(.active) {
    border: 2px solid currentColor;
    background: transparent;
  }

  /* TASKS */
  .tasks-section {
    padding: 16px;
  }

  .tasks-section h3 {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #718096;
    margin-bottom: 12px;
  }

  .task-item {
    background: white;
    border-radius: 16px;
    padding: 0;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    min-height: 68px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.1s ease;
    -webkit-user-select: none;
    user-select: none;
  }

  .task-item:active { transform: scale(0.99); }

  .task-item.completed {
    opacity: 0.65;
  }

  .task-check-area {
    width: 68px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: stretch;
  }

  .task-checkbox {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid #CBD5E0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 14px;
    color: white;
  }

  .task-item.completed .task-checkbox {
    border-color: transparent;
    background: currentColor;
  }

  .task-body {
    flex: 1;
    padding: 14px 16px 14px 0;
  }

  .task-name {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #2D3748;
    line-height: 1.3;
  }

  .task-item.completed .task-name {
    text-decoration: line-through;
    color: #A0AEC0;
  }

  .task-freq-badge {
    display: inline-block;
    margin-top: 5px;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    background: #F7FAFC;
    color: #718096;
  }

  .task-week-count {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 4px;
    display: inline-block;
  }

  /* READONLY OVERLAY */
  .readonly-banner {
    background: #FEF3C7;
    color: #92400E;
    text-align: center;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
  }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confetti-fall 0.8s ease-out forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(80px) rotate(360deg) scale(0); opacity: 0; }
  }

  /* HISTORY in child view */
  .history-btn {
    margin: 0 16px 16px;
    padding: 14px;
    background: white;
    border-radius: 14px;
    border: none;
    width: calc(100% - 32px);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #718096;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  /* ADMIN SCREEN */
  #screen-admin {
    background: var(--bg);
  }

  .admin-header {
    background: linear-gradient(135deg, #2D3748, #4A5568);
    padding: 52px 20px 24px;
    color: white;
  }

  .admin-header h2 {
    font-size: 24px;
    font-weight: 900;
  }

  .admin-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 16px 16px 0;
    margin-bottom: -1px;
  }

  .admin-nav::-webkit-scrollbar { display: none; }

  .admin-tab {
    flex-shrink: 0;
    padding: 10px 18px;
    border-radius: 12px 12px 0 0;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    border: none;
    transition: all 0.15s;
  }

  .admin-tab.active {
    background: var(--bg);
    color: var(--text);
  }

  .admin-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .summary-table {
    background: white;
    border-radius: var(--radius-sm);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  .summary-row {
    display: flex;
    align-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .summary-row:last-child { border-bottom: none; }

  .summary-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .summary-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    flex: 1;
  }

  .summary-pct {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
  }

  .summary-trend {
    font-size: 16px;
    width: 24px;
    text-align: center;
  }

  .prev-pct {
    font-size: 12px;
    color: #A0AEC0;
    font-weight: 700;
  }

  /* ADMIN TASK EDITOR */
  .child-section {
    background: white;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .child-section-header {
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .child-section-header h3 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 16px;
  }

  .section-toggle { font-size: 20px; transition: transform 0.2s; }
  .section-open .section-toggle { transform: rotate(180deg); }

  .section-tasks { display: none; }
  .section-open .section-tasks { display: block; }

  .admin-task-row {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .admin-task-row:last-child { border-bottom: none; }

  .admin-task-name {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: #2D3748;
  }

  .admin-task-name.inactive { color: #A0AEC0; text-decoration: line-through; }

  .freq-selector {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: #718096;
  }

  .freq-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .freq-btn:active { background: var(--bg); }

  .freq-val {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 15px;
    color: var(--text);
    min-width: 20px;
    text-align: center;
  }

  .task-action-btns {
    display: flex;
    gap: 4px;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: #F7FAFC;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .icon-btn:active { background: #EDF2F7; }
  .icon-btn.danger:active { background: #FFF5F5; }

  /* ADD TASK FORM */
  .add-task-form {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .add-task-input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-task-input:focus { border-color: #667eea; }

  .add-btn {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: white;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .add-btn:active { opacity: 0.85; }

  /* HISTORY SCREEN */
  #screen-history {
    background: var(--bg);
  }

  .history-header {
    padding: 52px 20px 20px;
    color: white;
  }

  .week-card {
    background: white;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .week-card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }

  .week-card-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
  }

  .week-card-pct {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
  }

  .week-card-details {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }

  .week-card.expanded .week-card-details { display: block; }

  .detail-task-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .detail-task-row:last-child { border-bottom: none; }

  .detail-task-name { color: #4A5568; font-weight: 600; flex: 1; padding-right: 8px; }
  .detail-task-score { font-family: 'Nunito', sans-serif; font-weight: 800; color: #2D3748; }

  /* MODALS */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 24px 24px 40px;
    animation: slide-up 0.25s ease;
  }

  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal h3 {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 20px;
    text-align: center;
  }

  .pin-inputs {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .pin-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #E2E8F0;
    transition: background 0.15s;
  }

  .pin-dot.filled { background: #667eea; }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 260px;
    margin: 0 auto;
  }

  .pin-key {
    background: #F7FAFC;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }

  .pin-key:active { background: #EDF2F7; }
  .pin-key.delete { font-size: 16px; }

  .pin-error {
    text-align: center;
    color: #E53E3E;
    font-size: 13px;
    font-weight: 700;
    margin-top: 12px;
    height: 20px;
  }

  /* CLOSE WEEK BTN */
  .danger-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid #FEB2B2;
    background: #FFF5F5;
    color: #C53030;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }

  .danger-btn:active { background: #FED7D7; }

  /* CONFIRM DIALOG */
  .confirm-modal .modal { border-radius: 24px; width: calc(100% - 48px); margin: 0 24px 24px; }

  .confirm-btns {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .confirm-btns button {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
  }

  .btn-cancel { background: #F7FAFC; color: #4A5568; }
  .btn-confirm-danger { background: #FFF5F5; color: #C53030; }

  /* EDIT TASK MODAL */
  .edit-label {
    font-size: 13px;
    font-weight: 700;
    color: #718096;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  .edit-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  .edit-input:focus { border-color: #667eea; }

  .freq-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .freq-btn-lg {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .freq-display {
    font-family: 'Nunito', sans-serif;
    font-size: 24px;
    font-weight: 900;
    flex: 1;
    text-align: center;
  }

  .freq-desc {
    font-size: 12px;
    color: #718096;
    font-weight: 600;
    flex: 2;
  }

  .save-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;

// ==================== STATE ====================

let appData = null;

let historyData = [];   // Array of { weekKey, weekStart, weekEnd, snapshots: {childId: {pct, tasks}} }

let currentChild = null;
let currentDayIndex = 0; // 0=Mon ... 6=Sun
let editTarget = null; // {childId, taskIndex}
let editFreqTemp = 7;
let confirmCallback = null;
let pinBuffer = '';

const DAYS = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
const DAYS_FULL = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];

// ==================== STORAGE ====================

function loadData() {
  try {
    const saved = localStorage.getItem('tasksApp_data');
    appData = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    checksData = JSON.parse(localStorage.getItem('tasksApp_checks') || '{}');
    historyData = JSON.parse(localStorage.getItem('tasksApp_history') || '[]');
    
    // Ensure all children have tasks with proper structure
    appData.children.forEach(child => {
      child.tasks.forEach(task => {
        if (task.active === undefined) task.active = true;
      });
    });
  } catch(e) {
    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    checksData = {};
    historyData = [];
  }
}

function saveData() {
  localStorage.setItem('tasksApp_data', JSON.stringify(appData));
  localStorage.setItem('tasksApp_checks', JSON.stringify(checksData));
  localStorage.setItem('tasksApp_history', JSON.stringify(historyData));
}

// ==================== DATE UTILS ====================

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day; // Monday
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function getWeekKey(date) {
  const ws = getWeekStart(date);
  return ws.toISOString().split('T')[0];
}

function getDayOfWeekIndex(date) {
  // 0=Mon, 6=Sun
  const d = date.getDay();
  return d === 0 ? 6 : d - 1;
}

function getWeekDates(weekStart) {
  const dates = [];
  for(let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function formatDate(date) {
  return date.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
}

function formatShortDate(date) {
  return date.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
}

function formatWeekLabel(weekStart) {
  const end = new Date(weekStart);
  end.setDate(end.getDate() + 6);
  const startStr = weekStart.toLocaleDateString('es-MX', { day: 'numeric', month: 'long' });
  const endStr = end.toLocaleDateString('es-MX', { day: 'numeric', month: 'long' });
  return `${startStr} – ${endStr}`;
}

// ==================== CHECKS LOGIC ====================

function getCheckKey(weekKey, childId, taskId, dayIdx) {
  return `${weekKey}:${childId}:${taskId}:${dayIdx}`;
}

function isDayChecked(weekKey, childId, taskId, dayIdx) {
  const key = getCheckKey(weekKey, childId, taskId, dayIdx);
  return checksData[key] === 1;
}

function toggleCheck(weekKey, childId, taskId, dayIdx) {
  const key = getCheckKey(weekKey, childId, taskId, dayIdx);
  if (checksData[key] === 1) {
    delete checksData[key];
    return false;
  } else {
    checksData[key] = 1;
    return true;
  }
}

function getWeekChecksForTask(weekKey, childId, taskId) {
  let count = 0;
  for(let d = 0; d < 7; d++) {
    if(isDayChecked(weekKey, childId, taskId, d)) count++;
  }
  return count;
}

function calcWeekPct(weekKey, child) {
  let totalRequired = 0;
  let totalDone = 0;
  child.tasks.filter(t => t.active).forEach(task => {
    const done = Math.min(getWeekChecksForTask(weekKey, child.id, task.id), task.freq);
    totalRequired += task.freq;
    totalDone += done;
  });
  if (totalRequired === 0) return 0;
  return Math.round((totalDone / totalRequired) * 100);
}

function calcDayPct(weekKey, child, dayIdx) {
  // For day progress: count tasks completed today vs all active tasks
  const activeTasks = child.tasks.filter(t => t.active);
  if (activeTasks.length === 0) return 0;
  let done = 0;
  activeTasks.forEach(task => {
    if (isDayChecked(weekKey, child.id, task.id, dayIdx)) done++;
  });
  return Math.round((done / activeTasks.length) * 100);
}

function getFreqLabel(freq) {
  if (freq === 7) return 'Diaria';
  if (freq === 1) return 'Única';
  return `${freq}x semana`;
}

function getFreqDesc(freq) {
  if (freq === 7) return 'todos los días';
  if (freq === 1) return '1 vez en la semana';
  return `${freq} veces por semana`;
}

// ==================== HOME SCREEN ====================

function renderHome() {
  const today = new Date();
  const weekKey = getWeekKey(today);
  const weekStart = getWeekStart(today);
  
  document.getElementById('home-week-label').textContent = `Semana: ${formatWeekLabel(weekStart)}`;
  
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  
  appData.children.forEach(child => {
    const pct = calcWeekPct(weekKey, child);
    
    const card = document.createElement('div');
    card.className = 'child-card';
    card.onclick = () => openChild(child.id);
    
    // Circumference for ring
    const r = 22;
    const circ = 2 * Math.PI * r;
    const offset = circ - (pct / 100) * circ;
    
    card.innerHTML = `
      <div class="card-accent" style="background:${child.color}"></div>
      <div class="child-avatar" style="background:${child.color}">
        ${child.emoji}
      </div>
      <div class="child-name">${child.name}</div>
      <div class="progress-ring-container">
        <div class="ring-wrap">
          <svg width="52" height="52" viewBox="0 0 52 52">
            <circle class="ring-bg" cx="26" cy="26" r="${r}"/>
            <circle class="ring-fill" cx="26" cy="26" r="${r}"
              stroke="${child.color}"
              stroke-dasharray="${circ}"
              stroke-dashoffset="${offset}"/>
          </svg>
          <div class="ring-text">${pct}%</div>
        </div>
        <div class="progress-info">
          <div class="pct-label" style="color:${child.color}">${pct}%</div>
          <div class="pct-sub">esta semana</div>
        </div>
      </div>
    `;
    
    container.appendChild(card);
  });

  // Auto close week check
  autoCloseWeekIfNeeded();
}

function autoCloseWeekIfNeeded() {
  const today = new Date();
  const lastClosed = localStorage.getItem('tasksApp_lastClosed');
  const weekKey = getWeekKey(today);
  
  if (lastClosed && lastClosed !== weekKey) {
    // Week changed — check if previous week was closed
    const prevWeekStart = getWeekStart(new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000));
    const prevWeekKey = getWeekKey(prevWeekStart);
    const alreadyClosed = historyData.find(h => h.weekKey === prevWeekKey);
    if (!alreadyClosed) {
      closeWeek(prevWeekKey);
    }
  }
  localStorage.setItem('tasksApp_lastClosed', weekKey);
}

  showScreen('child');

function renderChildScreen() {
  const today = new Date();
  const weekKey = getWeekKey(today);
  const weekStart = getWeekStart(today);
  const weekDates = getWeekDates(weekStart);
  const todayDayIdx = getDayOfWeekIndex(today);

  document.getElementById('child-header').style.background = `linear-gradient(135deg, ${color}dd, ${color}99)`;

  const displayDate = weekDates[currentDayIndex];
  document.getElementById('child-header-date').textContent = formatDate(displayDate);

  // Weekly progress
  const weekPct = calcWeekPct(weekKey, currentChild);
  document.getElementById('weekly-progress-fill').style.width = weekPct + '%';
  document.getElementById('weekly-pct-text').textContent = weekPct + '%';

  // Day progress
  const dayPct = calcDayPct(weekKey, currentChild, currentDayIndex);
  document.getElementById('day-progress-pct').textContent = dayPct + '%';

  // Count weekly completed vs required
  let totalReq = 0, totalDone = 0;
  currentChild.tasks.filter(t => t.active).forEach(task => {
    totalReq += task.freq;
    totalDone += Math.min(getWeekChecksForTask(weekKey, currentChild.id, task.id), task.freq);
  });
  document.getElementById('weekly-tasks-label').textContent = `${totalDone} de ${totalReq} cumplimientos`;

  // Day tabs
  const tabsContainer = document.getElementById('day-tabs');
  tabsContainer.innerHTML = '';
  weekDates.forEach((date, idx) => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (idx === currentDayIndex ? ' active' : '') + (idx === todayDayIdx ? ' today-tab' : '');
    if (idx === currentDayIndex) {
      tab.style.background = color;
    }
    tab.innerHTML = `<span class="tab-day">${DAYS[idx]}</span><span class="tab-num">${date.getDate()}</span>`;
    tab.onclick = () => switchDay(idx);
    tabsContainer.appendChild(tab);
  });

  // Readonly banner
  const isToday = currentDayIndex === todayDayIdx;
  const isPast = currentDayIndex < todayDayIdx;
  document.getElementById('readonly-banner').style.display = (isPast && !isToday) ? 'block' : 'none';

  // Section label
  document.getElementById('tasks-section-label').textContent = isToday ? 'Tareas de hoy' : `Tareas del ${DAYS_FULL[currentDayIndex]}`;

  // History button
  document.getElementById('child-history-btn').onclick = () => openHistory(currentChild.id);
  document.getElementById('child-history-btn').style.color = color;

  // Tasks
  renderTasksList(weekKey, todayDayIdx);
}

function renderTasksList(weekKey, todayDayIdx) {
  const list = document.getElementById('tasks-list');
  list.innerHTML = '';
  const isEditable = currentDayIndex <= todayDayIdx;
  const color = currentChild.color;

  const activeTasks = currentChild.tasks.filter(t => t.active);

  if (activeTasks.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📋</div><p>No hay tareas activas</p></div>`;
    return;
  }

  activeTasks.forEach(task => {
    const checked = isDayChecked(weekKey, currentChild.id, task.id, currentDayIndex);
    const weekCount = getWeekChecksForTask(weekKey, currentChild.id, task.id);
    const weekFull = weekCount >= task.freq;

    const item = document.createElement('div');
    item.className = 'task-item' + (checked ? ' completed' : '');
    item.style.cursor = isEditable ? 'pointer' : 'default';

    const freqBadgeColor = weekFull ? color + '22' : '#F7FAFC';
    const freqTextColor = weekFull ? color : '#718096';
    const weekCountColor = weekFull ? color : '#A0AEC0';

    item.innerHTML = `
      <div class="task-check-area">
        <div class="task-checkbox" style="color:${color}; ${checked ? `background:${color}` : ''}">
          ${checked ? '✓' : ''}
        </div>
      </div>
      <div class="task-body">
        <div class="task-name">${task.name}</div>
        <span class="task-freq-badge" style="background:${freqBadgeColor}; color:${freqTextColor}">
          ${getFreqLabel(task.freq)}
        </span>
        <span class="task-week-count" style="background:${weekCountColor}22; color:${weekCountColor}">
          ${weekCount}/${task.freq} esta semana
        </span>
      </div>
    `;

    if (isEditable) {
      item.onclick = () => handleTaskToggle(task, item, weekKey, todayDayIdx);
    }

    list.appendChild(item);
  });
}

function handleTaskToggle(task, itemEl, weekKey, todayDayIdx) {
  const wasChecked = isDayChecked(weekKey, currentChild.id, task.id, currentDayIndex);
  const nowChecked = toggleCheck(weekKey, currentChild.id, task.id, currentDayIndex);
  saveData();

  if (nowChecked && !wasChecked) {
    spawnConfetti(itemEl, currentChild.color);
  }

  renderChildScreen();
}

function switchDay(idx) {
  currentDayIndex = idx;
  renderChildScreen();
}

// ==================== CONFETTI ====================

function spawnConfetti(el, color) {
  const rect = el.getBoundingClientRect();
  const colors = [color, '#FCD34D', '#34D399', '#F87171', '#A78BFA'];
  for(let i = 0; i < 8; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = (rect.left + rect.width * Math.random()) + 'px';
    piece.style.top = rect.top + 'px';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    piece.style.animationDelay = (Math.random() * 0.2) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 1000);
  }
}

// ==================== HISTORY SCREEN ====================

function openHistory(childId) {
  const child = appData.children.find(c => c.id === childId);
  const header = document.getElementById('history-child-header');
  header.style.background = `linear-gradient(135deg, ${child.color}dd, ${child.color}99)`;
  document.getElementById('history-child-name').textContent = child.name + ' — Historial';
  document.getElementById('history-back-btn').onclick = () => {
    if (childId === currentChild?.id) {
      showScreen('child');
    } else {
      showScreen('admin');
    }
  };

  const list = document.getElementById('history-list');
  list.innerHTML = '';

  const childHistory = historyData.filter(h => h.snapshots && h.snapshots[childId]);
  
  if (childHistory.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📊</div><p>Aún no hay semanas cerradas</p></div>`;
  } else {
    childHistory.slice().reverse().forEach(week => {
      const snap = week.snapshots[childId];
      const card = document.createElement('div');
      card.className = 'week-card';
      
      const pctColor = snap.pct >= 80 ? '#10B981' : snap.pct >= 50 ? '#F59E0B' : '#EF4444';
      
      card.innerHTML = `
        <div class="week-card-header" onclick="this.parentElement.classList.toggle('expanded')">
          <div>
            <div class="week-card-title">Semana ${week.weekKey}</div>
            <div style="font-size:12px; color:#718096; font-weight:600; margin-top:2px;">${week.weekStart} – ${week.weekEnd}</div>
          </div>
          <div style="text-align:right;">
            <div class="week-card-pct" style="color:${pctColor}">${snap.pct}%</div>
            <div style="font-size:11px; color:#A0AEC0; font-weight:600;">cumplimiento</div>
          </div>
        </div>
        <div class="week-card-details">
          ${snap.tasks ? snap.tasks.map(t => `
            <div class="detail-task-row">
              <span class="detail-task-name">${t.name}</span>
              <span class="detail-task-score" style="color:${t.done >= t.freq ? child.color : '#EF4444'}">${t.done}/${t.freq}</span>
            </div>
          `).join('') : ''}
        </div>
      `;
      list.appendChild(card);
    });
  }

  showScreen('history');
}

// ==================== ADMIN SCREEN ====================

function openAdmin() {
  renderAdminSummary();
  renderAdminTasks();
  renderAdminHistory();
  showScreen('admin');
}

function switchAdminTab(tab, btn) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  
  document.getElementById('admin-summary').style.display = tab === 'summary' ? 'block' : 'none';
  document.getElementById('admin-tasks').style.display = tab === 'tasks' ? 'block' : 'none';
  document.getElementById('admin-history').style.display = tab === 'history' ? 'block' : 'none';
}

function renderAdminSummary() {
  const today = new Date();
  const weekKey = getWeekKey(today);
  const table = document.getElementById('admin-summary-table');
  table.innerHTML = `<div style="padding:14px 16px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:#718096; border-bottom:1px solid #EDF2F7;">Semana actual</div>`;
  
  appData.children.forEach(child => {
    const pct = calcWeekPct(weekKey, child);
    const lastWeek = historyData.filter(h => h.snapshots && h.snapshots[child.id]).slice(-1)[0];
    const prevPct = lastWeek ? lastWeek.snapshots[child.id].pct : null;
    const trend = prevPct !== null ? (pct > prevPct ? '↑' : pct < prevPct ? '↓' : '→') : '–';
    const trendColor = trend === '↑' ? '#10B981' : trend === '↓' ? '#EF4444' : '#A0AEC0';
    
    table.innerHTML += `
      <div class="summary-row">
        <div class="summary-dot" style="background:${child.color}"></div>
        <div class="summary-name">${child.name}</div>
        ${prevPct !== null ? `<div class="prev-pct">${prevPct}%</div>` : ''}
        <div class="summary-trend" style="color:${trendColor}">${trend}</div>
        <div class="summary-pct" style="color:${child.color}">${pct}%</div>
      </div>
    `;
  });
}

function renderAdminTasks() {
  const container = document.getElementById('admin-tasks-list');
  container.innerHTML = '';
  
  appData.children.forEach((child, childIdx) => {
    const section = document.createElement('div');
    section.className = 'child-section';
    
    section.innerHTML = `
      <div class="child-section-header" onclick="this.parentElement.classList.toggle('section-open')">
        <h3 style="color:${child.color}">${child.name}</h3>
        <span class="section-toggle">▾</span>
      </div>
      <div class="section-tasks">
        <div id="tasks-edit-${child.id}"></div>
        <div class="add-task-form">
          <input class="add-task-input" id="new-task-${child.id}" placeholder="Nueva tarea..." type="text" />
          <button class="add-btn" style="background:${child.color}" onclick="addTask('${child.id}')">+ Agregar</button>
        </div>
      </div>
    `;
    
    container.appendChild(section);
    renderChildEditTasks(child.id);
  });
}

function renderChildEditTasks(childId) {
  const child = appData.children.find(c => c.id === childId);
  const container = document.getElementById('tasks-edit-' + childId);
  container.innerHTML = '';
  
  child.tasks.forEach((task, taskIdx) => {
    const row = document.createElement('div');
    row.className = 'admin-task-row';
    row.innerHTML = `
      <div class="task-action-btns">
        <button class="icon-btn" onclick="toggleTaskActive('${childId}', ${taskIdx})" title="${task.active ? 'Desactivar' : 'Activar'}">
          ${task.active ? '👁' : '🚫'}
        </button>
      </div>
      <div class="admin-task-name ${task.active ? '' : 'inactive'}">${task.name}</div>
      <div class="freq-selector">
        <button class="freq-btn" onclick="changeFreq('${childId}', ${taskIdx}, -1)">−</button>
        <span class="freq-val">${task.freq}</span>
        <button class="freq-btn" onclick="changeFreq('${childId}', ${taskIdx}, 1)">+</button>
      </div>
      <div class="task-action-btns">
        <button class="icon-btn" onclick="openEditModal('${childId}', ${taskIdx})">✏️</button>
        <button class="icon-btn danger" onclick="confirmDeleteTask('${childId}', ${taskIdx})">🗑</button>
      </div>
    `;
    container.appendChild(row);
  });
}

function renderAdminHistory() {
  const container = document.getElementById('admin-history-list');
  container.innerHTML = '';
  
  if (historyData.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">📊</div><p>No hay semanas cerradas aún</p></div>`;
    return;
  }
  
  historyData.slice().reverse().forEach(week => {
    const card = document.createElement('div');
    card.className = 'week-card';
    
    let summaryHTML = '';
    appData.children.forEach(child => {
      const snap = week.snapshots && week.snapshots[child.id];
      if (!snap) return;
      const pctColor = snap.pct >= 80 ? '#10B981' : snap.pct >= 50 ? '#F59E0B' : '#EF4444';
      summaryHTML += `
        <div style="display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #EDF2F7;">
          <div style="width:10px;height:10px;border-radius:50%;background:${child.color}"></div>
          <span style="flex:1;font-size:14px;font-weight:700">${child.name}</span>
          <span style="font-family:'Nunito',sans-serif;font-weight:900;color:${pctColor}">${snap.pct}%</span>
          <button onclick="openHistory('${child.id}')" style="background:${child.color}22;border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:${child.color};cursor:pointer;">Ver →</button>
        </div>
      `;
    });
    
    card.innerHTML = `
      <div class="week-card-header" onclick="this.parentElement.classList.toggle('expanded')">
        <div>
          <div class="week-card-title">Semana ${week.weekKey}</div>
          <div style="font-size:12px;color:#718096;font-weight:600;margin-top:2px;">${week.weekStart} – ${week.weekEnd}</div>
        </div>
        <span style="font-size:20px;color:#CBD5E0">▾</span>
      </div>
      <div class="week-card-details">${summaryHTML}</div>
    `;
    container.appendChild(card);
  });
}

// ==================== ADMIN ACTIONS ====================

function toggleTaskActive(childId, taskIdx) {
  const child = appData.children.find(c => c.id === childId);
  child.tasks[taskIdx].active = !child.tasks[taskIdx].active;
  saveData();
  renderChildEditTasks(childId);
}

function changeFreq(childId, taskIdx, delta) {
  const child = appData.children.find(c => c.id === childId);
  const task = child.tasks[taskIdx];
  task.freq = Math.max(1, Math.min(7, task.freq + delta));
  saveData();
  renderChildEditTasks(childId);
}

function addTask(childId) {
  const input = document.getElementById('new-task-' + childId);
  const name = input.value.trim();
  if (!name) return;
  
  const child = appData.children.find(c => c.id === childId);
  const newTask = {
    id: 't' + Date.now(),
    name: name,
    freq: 7,
    active: true
  };
  child.tasks.push(newTask);
  saveData();
  input.value = '';
  renderChildEditTasks(childId);
}

function confirmDeleteTask(childId, taskIdx) {
  const child = appData.children.find(c => c.id === childId);
  showConfirm(
    '🗑 Eliminar tarea',
    `¿Eliminar "${child.tasks[taskIdx].name}"? Esta acción no se puede deshacer.`,
    () => {
      child.tasks.splice(taskIdx, 1);
      saveData();
      renderChildEditTasks(childId);
    }
  );
}

function confirmCloseWeek() {
  const today = new Date();
  const weekKey = getWeekKey(today);
  const already = historyData.find(h => h.weekKey === weekKey);
  
  if (already) {
    showConfirm('⚠️ Semana ya cerrada', 'Esta semana ya fue cerrada. ¿Quieres sobreescribir el snapshot?', () => {
      closeWeek(weekKey);
      renderAdminSummary();
      renderAdminHistory();
    });
    return;
  }
  
  showConfirm('🔒 Cerrar semana', 'Se guardará el progreso actual como historial. Puedes seguir registrando tareas después.', () => {
    closeWeek(weekKey);
    renderAdminSummary();
    renderAdminHistory();
  });
}

function closeWeek(weekKey) {
  const weekStart = new Date(weekKey + 'T00:00:00');
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  
  const snapshots = {};
  appData.children.forEach(child => {
    const tasks = child.tasks.filter(t => t.active).map(task => ({
      name: task.name,
      done: getWeekChecksForTask(weekKey, child.id, task.id),
      freq: task.freq
    }));
    
    let totalReq = 0, totalDone = 0;
    tasks.forEach(t => {
      totalReq += t.freq;
      totalDone += Math.min(t.done, t.freq);
    });
    
    snapshots[child.id] = {
      pct: totalReq > 0 ? Math.round((totalDone / totalReq) * 100) : 0,
      tasks: tasks
    };
  });
  
  const existing = historyData.findIndex(h => h.weekKey === weekKey);
  const entry = {
    weekKey,
    weekStart: weekStart.toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' }),
    weekEnd: weekEnd.toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' }),
    snapshots
  };
  
  if (existing >= 0) {
    historyData[existing] = entry;
  } else {
    historyData.push(entry);
  }
  
  saveData();
}

// ==================== EDIT TASK MODAL ====================

function openEditModal(childId, taskIdx) {
  const child = appData.children.find(c => c.id === childId);
  const task = child.tasks[taskIdx];
  editTarget = { childId, taskIdx };
  editFreqTemp = task.freq;
  
  document.getElementById('edit-name').value = task.name;
  document.getElementById('edit-freq-val').textContent = editFreqTemp;
  document.getElementById('edit-freq-desc').textContent = getFreqDesc(editFreqTemp);
  
  document.getElementById('edit-modal').classList.add('active');
}

function editFreqChange(delta) {
  editFreqTemp = Math.max(1, Math.min(7, editFreqTemp + delta));
  document.getElementById('edit-freq-val').textContent = editFreqTemp;
  document.getElementById('edit-freq-desc').textContent = getFreqDesc(editFreqTemp);
}

function saveEditTask() {
  const name = document.getElementById('edit-name').value.trim();
  if (!name) return;
  
  const child = appData.children.find(c => c.id === editTarget.childId);
  child.tasks[editTarget.taskIdx].name = name;
  child.tasks[editTarget.taskIdx].freq = editFreqTemp;
  saveData();
  renderChildEditTasks(editTarget.childId);
  closeEditModal();
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('active');
  editTarget = null;
}

// ==================== PIN MODAL ====================

function openAdminPin() {
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-modal').classList.add('active');
}

function closePinModal() {
  document.getElementById('pin-modal').classList.remove('active');
  pinBuffer = '';
}

function pinKey(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  
  if (pinBuffer.length === 4) {
    setTimeout(() => {
      if (pinBuffer === '2025') {
        closePinModal();
        openAdmin();
      } else {
        document.getElementById('pin-error').textContent = 'PIN incorrecto, intenta de nuevo';
        pinBuffer = '';
        updatePinDots();
      }
    }, 200);
  }
}

function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
}

function updatePinDots() {
  for(let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.classList.toggle('filled', i < pinBuffer.length);
  }
}

// ==================== CONFIRM MODAL ====================

function showConfirm(title, body, callback) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent = body;
  confirmCallback = callback;
  document.getElementById('confirm-modal').classList.add('active');
}

function closeConfirmModal() {
  document.getElementById('confirm-modal').classList.remove('active');
  confirmCallback = null;
}

document.getElementById('confirm-ok-btn').onclick = () => {
  closeConfirmModal();
  if (confirmCallback) confirmCallback();
};

// ==================== NAVIGATION ====================

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  currentChild = null;
  renderHome();
  showScreen('home');
}

// Close modals on overlay click
document.getElementById('pin-modal').onclick = function(e) {
  if (e.target === this) closePinModal();
};
document.getElementById('confirm-modal').onclick = function(e) {
  if (e.target === this) closeConfirmModal();
};
document.getElementById('edit-modal').onclick = function(e) {
  if (e.target === this) closeEditModal();
};

// ==================== INIT ====================

loadData();
renderHome();
showScreen('home');
</script>
